<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codificadores e Compressores</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="assets/favicon.png" type="image/png" />
  </head>
  <body>
    <header>
      <h1>Dev Utils</h1>
      <p class="subtitle">Funções 100% client-side para uso interno</p>
    </header>

    <div class="wrapper">
      <aside class="sidebar">
        <a href="index.html" class="sidebar-link active"
          >Codificadores & Compressores</a
        >
        <a href="formatters.html" class="sidebar-link">Formatadores</a>
        <a href="validators.html" class="sidebar-link">Validadores</a>
        <a href="parquet.html" class="sidebar-link">Visualizador</a>
        <a href="diff.html" class="sidebar-link">Diff</a>
      </aside>
      <main>
        <div class="tab-pane active" id="encoders">
          <div class="form-group row encoder-toolbar">
            <div>
              <label for="encoder-format">Selecione o Formato:</label>
              <select id="encoder-format">
                <option value="base64">Base64</option>
                <option value="base91">Base91</option>
                <option value="gzip">GZIP</option>
                <option value="zstd">ZSTD</option>
                <option value="md5sum">MD5 (md5sum)</option>
                <option value="sha256-base64">SHA256 (Base64)</option>
                <option value="sha256-hex">SHA256 (Hex)</option>
              </select>
            </div>
            <div>
              <span class="field-label">Fluxo</span>
              <div
                id="encoder-mode-controls"
                class="segmented-control"
                role="group"
                aria-label="Fluxo da transformação"
              >
                <button
                  type="button"
                  class="segmented-btn active"
                  data-mode="encode"
                >
                  Codificar
                </button>
                <button type="button" class="segmented-btn" data-mode="decode">
                  Decodificar
                </button>
              </div>
            </div>
          </div>
          <div class="input-output">
            <div class="form-group">
              <label for="encoder-input">Entrada:</label>
              <textarea
                id="encoder-input"
                placeholder="Texto para codificar ou decodificar"
              ></textarea>
            </div>
            <div class="swap-control">
              <button
                id="encoder-swap"
                class="swap-btn"
                type="button"
                aria-label="Trocar entrada e saída"
                title="Trocar entrada e saída"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M4 9h16" />
                  <path d="M16 5l4 4-4 4" />
                  <path d="M20 15H4" />
                  <path d="M8 11l-4 4 4 4" />
                </svg>
              </button>
            </div>
            <div class="form-group">
              <label for="encoder-output">Saída:</label>
              <textarea id="encoder-output" readonly></textarea>
            </div>
          </div>
          <div class="btn-group">
            <button id="encoder-run" class="primary-btn">Executar</button>
          </div>
        </div>
      </main>
    </div>

    <footer>
      <p>100% Client-side - Nenhum dado é enviado para servidores</p>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
